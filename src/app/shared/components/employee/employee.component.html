<mat-card>
  <h2>Employee Form</h2>

  <form #empform="ngForm" (ngSubmit)="OnSubmit()">
    <div class="form-group">
      <label for="ename">Name</label>
      <input
        type="text"
        name="ename"
        title="ename"
        ngModel
        #name="ngModel"
        required
        class="form-control"
      />

      <strong
        class="text-danger"
        *ngIf="name.touched && name.hasError('required')"
      >
        Employee name is required
      </strong>
    </div>

    <div class="form-group">
      <label for="empid">Emp Id</label>
      <input
        type="text"
        name="empid"
        ngModel
        required
        #empid="ngModel"
        class="form-control"
      />
      <strong
        class="text-danger"
        *ngIf="empid.touched && empid.hasError('required')"
      >
        Employee ID is required
      </strong>
    </div>

    <div class="from-group">
      <label for="leave">Leave Type</label>
      <select
        name="leave"
        id="leave"
        ngModel
        required
        class="form-control"
        #leave="ngModel"
      >
        <option value="Annual Leave">Annual Leave</option>
        <option value="Maternity Leave">Maternity Leave</option>
        <option value="Paternity Leave">Paternity Leave</option>
        <option value="Marriage Leave">Marriage Leave</option>
        <option value="Bereavement Leave">Bereavement Leave</option>
        <option value="Compensatory Off">Compensatory Off</option>
        <option value="Work From Home">Work From Home</option>
        <option value="Leave Without Pay">Leave Without Pay</option>
      </select>

      <strong class="text-danger" *ngIf="leave.touched && leave.hasError('required')">
        Leave type is rquireed 
      </strong>
    </div>

    <div class="form-group">
        <label for="from">From Date</label>
        <input type="date" ngModel required class="form-control" name="from" #from="ngModel" [(ngModel)]="FormDate">

        <div class="text-danger" *ngIf="from.touched && from.hasError('required')">
            From Date is required 
        </div>

        <label for="to">To Date</label>
        <input type="date" class="form-control" ngModel required name="to" #to="ngModel" [(ngModel)]="ToDate"> 

        <div class="text-danger" *ngIf="to.touched && to.hasError('required')">
            To Date is required 
        </div>

        <div class="text-danger" *ngIf="FronToDate()">
            To Date cannot be less than From Date
        </div>
    </div>

    <div class="form-group">
        <label for="reason">Reason</label>
        <textarea name="reason" id="reason" class="form-control" rows="3" ngModel required #reason="ngModel" minlength="20"></textarea>

        <strong class="text-danger" *ngIf="reason.touched && reason.hasError('required')">
            Reason is required 
        </strong>

        <strong class="text-danger" *ngIf="reason.dirty && reason.hasError('minlength')">
             Reason minimum 20 characters
        </strong>
    </div>

    <button mat-raised-button color="primary" class="w-100" [disabled]="empform.invalid">Apply</button>
  </form>
</mat-card>
